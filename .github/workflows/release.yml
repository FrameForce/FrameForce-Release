name: Release Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: [actions/checkout](https://github.com)@v4

      - name: VirusTotal Scan
        uses: [cssnr/virustotal-action](https://github.com)@v1
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            *.exe
            *.zip
          update_release: false
          summary: false
          sha256: false
