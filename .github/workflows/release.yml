name: Release Scan

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
# Line 12 is the 'uses:' line above. Ensure it has exactly 8 spaces before it.

      - name: VirusTotal Scan
        uses: cssnr/virustotal-action@v1
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            README.md
          update_release: false
          summary: false
          sha256: false
