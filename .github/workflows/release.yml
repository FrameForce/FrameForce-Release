      - name: VirusTotal Scan
        uses: [cssnr/virustotal-action](https://github.com)@v1
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            *.exe
            *.zip
          update_release: false
          summary: false
          sha256: false  # This specifically tells the tool not to display the hash
